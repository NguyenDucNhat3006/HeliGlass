version: "3.8"

services:
  mysql:
    image: mysql:8.0-alpine
    container_name: helicorp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-helicorp_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - helicorp-network

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helicorp-php
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-helicorp_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - .:/var/www/html
    networks:
      - helicorp-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  helicorp-network:
    driver: bridge
